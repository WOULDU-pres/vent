services:
  postgres:
    image: postgres:16
    container_name: postgres-vent
    environment:
      POSTGRES_DB: vent_db
      POSTGRES_USER: vent
      POSTGRES_PASSWORD: vent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vent-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: redis-vent
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vent-network

  spring:
    build:
      context: ./backend
    container_name: spring-vent
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vent_db
      SPRING_DATASOURCE_USERNAME: vent
      SPRING_DATASOURCE_PASSWORD: vent
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: elasticsearch-vent
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - vent-network

  logstash:
    image: logstash:8.13.0
    container_name: logstash-vent
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - vent-network

  kibana:
    image: kibana:8.13.0
    container_name: kibana-vent
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - vent-network

volumes:
  postgres_data:
  redis_data:
  es_data:

networks:
  vent-network:
