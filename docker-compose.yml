services:
  postgres:
    image: postgres:16
    container_name: postgres-vent
    environment:
      POSTGRES_DB: vent_db
      POSTGRES_USER: vent
      POSTGRES_PASSWORD: vent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vent-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: redis-vent
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vent-network

  spring:
    build:
      context: ./backend
    container_name: spring-vent
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vent_db
      SPRING_DATASOURCE_USERNAME: vent
      SPRING_DATASOURCE_PASSWORD: vent
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      
volumes:
  postgres_data:
  redis_data:

networks:
  vent-network:
