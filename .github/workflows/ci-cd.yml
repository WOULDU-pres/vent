# 임시 cicd 파일
# .github/workflows/ci-cd.yml
name: Vent CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKER_IMAGE: hwjoo/vent

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 리포지토리 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 환경 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Docker 서비스 실행 (테스트용)
      - name: Start Docker services
        run: |
          docker compose -f docker-compose.yml up -d postgres redis
          sleep 10  # DB 초기화 대기

      # 4. 백엔드 빌드 및 테스트
      - name: Build backend with Gradle
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew clean build

      # 5. 프론트엔드 빌드
      - name: Build frontend with npm
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 6. Docker 이미지 빌드 및 푸시
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:backend-${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:frontend-${{ github.sha }}

      # 7. 서버 배포 (예시: SSH로 Docker Compose 실행)
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            docker compose pull
            docker compose up -d
